<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ottawa Guesser Pro</title>
  <!-- Leaflet & Supabase & EXIF -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b1a1f;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      color: #fff;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #141e24;
    }

    /* Photo layer – geoguessr style */
    #photo {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: #0b1419;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.7);
    }
    #photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.95) contrast(1.05);
      transition: opacity 0.3s ease;
    }

    /* Mini-map – geoguessr style floating panel */
    #map-wrapper {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 30;
      width: 220px;
      height: 160px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
      background: #1e2a30;
      cursor: pointer;
    }
    #map-wrapper.expanded {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0 !important;
      border: none !important;
      z-index: 15 !important; /* Lower than controls so buttons show */
      box-shadow: none;
    }
    #map {
      width: 100%;
      height: 100%;
      background: #1f2b32;
    }

    /* HUD – top left - HIGHEST Z-INDEX */
    #hud {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 100 !important; /* Always on top */
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 18px;
      pointer-events: none;
    }
    #hud span {
      background: rgba(255,255,255,0.08);
      padding: 2px 12px;
      border-radius: 30px;
      margin-left: 2px;
    }
    .hud-item {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .hud-item strong {
      font-weight: 600;
      color: #b8e2f2;
    }

    /* Controls – bottom center - HIGHEST Z-INDEX */
    #controls {
      position: fixed;
      bottom: 28px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 100 !important; /* Always on top of everything */
      padding: 0 16px;
      flex-wrap: wrap;
      pointer-events: none;
    }
    #controls button {
      pointer-events: auto;
      padding: 12px 24px;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      background: rgba(20, 30, 36, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #eef6fa;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: all 0.2s ease;
      cursor: pointer;
      min-width: 110px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    #controls button:hover {
      background: rgba(40, 60, 70, 0.9);
      transform: scale(1.02);
      border-color: rgba(255,255,255,0.25);
    }
    #controls button:active {
      transform: scale(0.96);
    }
    #controls button:disabled {
      opacity: 0.4;
      filter: grayscale(0.6);
      transform: none;
      pointer-events: none;
    }
    #submit-btn {
      background: rgba(30, 120, 180, 0.85);
      border-color: #4db8ff;
    }
    #submit-btn:hover {
      background: rgba(40, 150, 220, 0.95);
    }
    #upload-btn-open {
      background: rgba(60, 70, 80, 0.8);
    }

    /* Upload modal – geoguessr style */
    #upload-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200 !important;
      padding: 20px;
    }
    #upload-modal.active {
      display: flex !important;
    }
    .modal-box {
      background: #1f2c33;
      border-radius: 28px;
      padding: 28px 30px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
      color: #eef6fa;
      transition: transform 0.2s ease;
      position: relative;
    }
    .modal-box h3 {
      font-weight: 500;
      font-size: 1.6rem;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
      color: #cde3ed;
    }
    .modal-box input[type="file"] {
      background: #2a3a42;
      border: 1px solid #3d535e;
      padding: 12px;
      border-radius: 40px;
      width: 100%;
      color: #d4e9f5;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .modal-box input[type="file"]::file-selector-button {
      background: #3a5a6a;
      border: none;
      padding: 6px 18px;
      border-radius: 30px;
      color: white;
      font-weight: 500;
      margin-right: 12px;
      cursor: pointer;
    }
    #preview {
      width: 100%;
      border-radius: 16px;
      margin: 12px 0 14px;
      background: #0f1a20;
      border: 1px solid #2f434d;
      max-height: 180px;
      object-fit: cover;
      display: none;
    }
    #upload-map {
      height: 200px;
      border-radius: 16px;
      border: 1px solid #2f434d;
      margin: 10px 0 16px;
      background: #1e2a30;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .modal-actions button {
      padding: 10px 28px;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      background: #3a5a6a;
      color: white;
      cursor: pointer;
      transition: 0.15s;
    }
    .modal-actions button:hover {
      background: #4d7184;
    }
    #upload-submit {
      background: #2a8bb0;
    }
    #upload-submit:hover {
      background: #3aa3cc;
    }

    /* End screen */
    #end-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 300 !important;
      padding: 20px;
    }
    #end-screen.active {
      display: flex !important;
    }
    #end-screen .modal-box {
      max-width: 400px;
      text-align: center;
      padding: 32px 28px;
    }
    #end-screen h2 {
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 8px;
      color: #cde3ed;
    }
    #end-screen p {
      font-size: 1.1rem;
      margin: 8px 0;
      color: #c0dae6;
    }
    #end-screen .modal-box button {
      margin-top: 18px;
      background: #2a8bb0;
      border: none;
      padding: 12px 40px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.15s;
    }
    #end-screen .modal-box button:hover {
      background: #3aa3cc;
    }

    /* responsive */
    @media (max-width: 600px) {
      #map-wrapper { width: 160px; height: 120px; bottom: 16px; right: 16px; }
      #hud { font-size: 0.8rem; padding: 8px 14px; gap: 10px; }
      #controls button { padding: 10px 16px; min-width: 80px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
<div id="game-container">
  <!-- Photo -->
  <div id="photo"><img id="game-image" src="" alt="ottawa scene"></div>

  <!-- Map wrapper -->
  <div id="map-wrapper">
    <div id="map"></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-item">🎯 Round <span id="round">1</span>/5</div>
    <div class="hud-item">⭐ Score <span id="score">0</span></div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button id="toggle-map-btn">🗺️ Map</button>
    <button id="submit-btn" disabled>📍 Submit</button>
    <button id="upload-btn-open">📤 Upload</button>
  </div>
</div>

<!-- Upload Modal -->
<div id="upload-modal">
  <div class="modal-box">
    <h3>📸 Upload photo</h3>
    <input type="file" id="photo-upload" accept="image/*">
    <img id="preview" style="display:block;">
    <div id="upload-map"></div>
    <div class="modal-actions">
      <button id="upload-close-btn">Cancel</button>
      <button id="upload-submit">Upload</button>
    </div>
  </div>
</div>

<!-- End Screen -->
<div id="end-screen">
  <div class="modal-box">
    <h2>🏁 Game Over</h2>
    <p>Total Score: <span id="final-score"></span></p>
    <p>Average: <span id="avg-score"></span></p>
    <p>Best round: <span id="best-round"></span></p>
    <button onclick="restartGame()">🔄 Play Again</button>
  </div>
</div>

<script>
  (function(){
    // Supabase config
    const supabaseClient = supabase.createClient(
      'https://hqdljdibiggoyihuoabe.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxZGxqZGliaWdnb3lpaHVvYWJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDcyOTUsImV4cCI6MjA4OTc4MzI5NX0.PBG0CCWtvqFV8M5xkerQIIiXMN4PhREVkyhEDn9aaqo'
    );

    const OTTAWA_BOUNDS = L.latLngBounds([45.0, -76.5], [45.6, -75.0]);

    // --- main map ---
    const mapEl = document.getElementById('map');
    const map = L.map(mapEl, { maxBounds: OTTAWA_BOUNDS, maxBoundsViscosity: 1 })
      .setView([45.4215, -75.6972], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OSM'
    }).addTo(map);

    // --- upload map ---
    const uploadMapEl = document.getElementById('upload-map');
    const uploadMap = L.map(uploadMapEl, { maxBounds: OTTAWA_BOUNDS, maxBoundsViscosity: 1 })
      .setView([45.4215, -75.6972], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OSM'
    }).addTo(uploadMap);

    // state
    let guessMarker = null, actualMarker = null, line = null, uploadMarker = null;
    let actualLat = 0, actualLng = 0;
    let round = 1, totalScore = 0, scores = [];
    let mapOpen = false;
    let isSubmitting = false;

    // DOM refs
    const gameImage = document.getElementById('game-image');
    const roundSpan = document.getElementById('round');
    const scoreSpan = document.getElementById('score');
    const submitBtn = document.getElementById('submit-btn');
    const toggleBtn = document.getElementById('toggle-map-btn');
    const mapWrapper = document.getElementById('map-wrapper');
    const modal = document.getElementById('upload-modal');
    const modalBox = document.querySelector('#upload-modal .modal-box');
    const previewImg = document.getElementById('preview');
    const fileInput = document.getElementById('photo-upload');
    const uploadSubmit = document.getElementById('upload-submit');
    const uploadClose = document.getElementById('upload-close-btn');

    // --- helpers ---
    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function clearMapMarkers() {
      if (guessMarker) { map.removeLayer(guessMarker); guessMarker = null; }
      if (actualMarker) { map.removeLayer(actualMarker); actualMarker = null; }
      if (line) { map.removeLayer(line); line = null; }
      submitBtn.disabled = true;
    }

    function resetMapState() {
      clearMapMarkers();
      mapOpen = false;
      mapWrapper.classList.remove('expanded');
      toggleBtn.textContent = '🗺️ Map';
    }

    // --- load round ---
    async function loadRound() {
      try {
        const { data } = await supabaseClient.from('photos').select('*');
        if (!data || data.length === 0) {
          alert('No photos found in database. Please upload some!');
          return;
        }
        const ottawaPhotos = data.filter(p => OTTAWA_BOUNDS.contains([p.lat, p.lng]));
        const pool = ottawaPhotos.length > 0 ? ottawaPhotos : data;
        const random = pool[Math.floor(Math.random() * pool.length)];
        gameImage.src = random.url;
        actualLat = random.lat;
        actualLng = random.lng;
        resetMapState();
        map.setView([45.4215, -75.6972], 11);
      } catch (e) {
        console.warn('load error', e);
      }
    }

    // --- map click ---
    map.on('click', function(e) {
      if (!mapOpen) return;
      if (!OTTAWA_BOUNDS.contains(e.latlng)) {
        return;
      }
      if (guessMarker) map.removeLayer(guessMarker);
      guessMarker = L.marker(e.latlng, { draggable: false }).addTo(map);
      submitBtn.disabled = false;
    });

    // --- toggle map ---
    toggleBtn.addEventListener('click', function() {
      mapOpen = !mapOpen;
      if (mapOpen) {
        mapWrapper.classList.add('expanded');
        toggleBtn.textContent = '🗺️ Close';
        setTimeout(() => map.invalidateSize(), 50);
      } else {
        mapWrapper.classList.remove('expanded');
        toggleBtn.textContent = '🗺️ Map';
        setTimeout(() => map.invalidateSize(), 50);
      }
    });

    // --- submit guess ---
    submitBtn.addEventListener('click', function() {
      if (isSubmitting || !guessMarker) return;
      isSubmitting = true;
      const guess = guessMarker.getLatLng();
      actualMarker = L.marker([actualLat, actualLng], { color: 'red' }).addTo(map);
      const dist = haversine(guess.lat, guess.lng, actualLat, actualLng);
      const score = Math.max(0, Math.round(5000 - dist * 40));
      scores.push(score);
      totalScore += score;
      scoreSpan.textContent = totalScore;

      line = L.polyline([[guess.lat, guess.lng], [actualLat, actualLng]], { color: '#ff4d6d', weight: 3, opacity: 0.8 }).addTo(map);
      const bounds = L.latLngBounds([guess, [actualLat, actualLng]]);
      map.fitBounds(bounds, { padding: [30, 30] });

      submitBtn.disabled = true;
      setTimeout(() => {
        isSubmitting = false;
        nextRound();
      }, 2000);
    });

    function nextRound() {
      round++;
      if (round > 5) {
        showEndScreen();
        return;
      }
      roundSpan.textContent = round;
      loadRound();
    }

    function showEndScreen() {
      const avg = scores.length ? Math.round(totalScore / scores.length) : 0;
      const best = scores.length ? Math.max(...scores) : 0;
      document.getElementById('final-score').textContent = totalScore;
      document.getElementById('avg-score').textContent = avg;
      document.getElementById('best-round').textContent = best;
      document.getElementById('end-screen').classList.add('active');
    }

    window.restartGame = function() {
      round = 1; totalScore = 0; scores = [];
      roundSpan.textContent = round;
      scoreSpan.textContent = totalScore;
      document.getElementById('end-screen').classList.remove('active');
      resetMapState();
      loadRound();
    };

    // --- upload modal logic ---
    function openModal() {
      modal.classList.add('active');
      if (uploadMarker) { uploadMap.removeLayer(uploadMarker); uploadMarker = null; }
      uploadMap.setView([45.4215, -75.6972], 11);
      setTimeout(() => uploadMap.invalidateSize(), 200);
      previewImg.style.display = 'none';
      fileInput.value = '';
    }

    document.getElementById('upload-btn-open').addEventListener('click', openModal);
    uploadClose.addEventListener('click', function() { modal.classList.remove('active'); });
    modal.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('active'); });

    // preview
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          previewImg.src = ev.target.result;
          previewImg.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    // upload map click for marker
    uploadMap.on('click', function(e) {
      if (!OTTAWA_BOUNDS.contains(e.latlng)) return;
      if (uploadMarker) uploadMap.removeLayer(uploadMarker);
      uploadMarker = L.marker(e.latlng).addTo(uploadMap);
    });

    // get coords from EXIF
    function getCoordsFromEXIF(file) {
      return new Promise((resolve, reject) => {
        EXIF.getData(file, function() {
          const lat = EXIF.getTag(this, 'GPSLatitude');
          const lng = EXIF.getTag(this, 'GPSLongitude');
          if (!lat || !lng) return reject('no EXIF');
          const convert = c => c[0] + c[1]/60 + c[2]/3600;
          resolve({ lat: convert(lat), lng: convert(lng) });
        });
      });
    }

    uploadSubmit.addEventListener('click', async function() {
      const file = fileInput.files[0];
      if (!file) { alert('Please select an image file.'); return; }

      let lat, lng;
      try {
        const coords = await getCoordsFromEXIF(file);
        lat = coords.lat; lng = coords.lng;
      } catch (e) {
        if (!uploadMarker) {
          alert('No GPS in image. Please click on the map to set location.');
          return;
        }
        const pos = uploadMarker.getLatLng();
        lat = pos.lat; lng = pos.lng;
      }

      if (!OTTAWA_BOUNDS.contains([lat, lng])) {
        alert('Location must be within Ottawa bounds.');
        return;
      }

      try {
        const fileName = Date.now() + '-' + file.name;
        const { error: uploadError } = await supabaseClient.storage.from('photos').upload(fileName, file);
        if (uploadError) throw uploadError;
        const { data: publicData } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
        const url = publicData.publicUrl;
        const { error: insertError } = await supabaseClient.from('photos').insert({ url, lat, lng });
        if (insertError) throw insertError;
        alert('✅ Photo uploaded!');
        modal.classList.remove('active');
        loadRound();
      } catch (err) {
        alert('Upload error: ' + err.message);
        console.warn(err);
      }
    });

    // --- init ---
    loadRound();

    // fix map resize on expand/collapse
    const resizeObserver = new ResizeObserver(() => { map.invalidateSize(); });
    resizeObserver.observe(mapWrapper);
  })();
</script>
</body>
</html>
